name: Composer install & unit tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - php: '8.1'
            symfony: '6.4'
          - php: '8.2'
            symfony: '6.4'
          - php: '8.2'
            symfony: '7.2'
          - php: '8.2'
            symfony: '7.3'
          - php: '8.2'
            symfony: '7.4'
          - php: '8.2'
            symfony: '7.4'
            dependencies: lowest
          - php: '8.3'
            symfony: '6.4'
          - php: '8.3'
            symfony: '7.4'
          - php: '8.4'
            symfony: '6.4'
          - php: '8.4'
            symfony: '7.4'
          - php: '8.4'
            symfony: '8.0'
          - php: '8.4'
            symfony: '8.1'
          - php: '8.5'
            symfony: '7.4'
          - php: '8.5'
            symfony: '8.0'
          - php: '8.5'
            symfony: '8.1'
      fail-fast: false

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Validate composer.json and composer.lock
        run: composer validate --strict

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-php-${{ matrix.php }}-symfony-${{ matrix.symfony }}-dependencies-${{ matrix.dependencies || 'default' }}-${{ hashFiles('composer.json') }}

      - name: Install dependencies
        env:
          SYMFONY_REQUIRE: ${{ matrix.symfony }}
        run: |
          if [ "${{ matrix.dependencies || 'default' }}" = "lowest" ]; then
            composer update --prefer-lowest --prefer-stable --prefer-dist --no-progress --no-interaction
          else
            composer install --prefer-dist --no-progress --no-interaction
          fi

      - name: Run test suite
        run: ./vendor/bin/simple-phpunit
